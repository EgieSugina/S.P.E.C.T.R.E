version: 2

project_name: spectre

before:
  hooks:
    - cd web && pnpm install --frozen-lockfile && pnpm build
    - cp -r web/dist internal/server/dist

builds:
  - id: spectre
    main: ./cmd/spectre
    binary: spectre
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X spectre/internal/version.Version={{.Version}}
      - -X spectre/internal/version.BuildDate={{.Date}}
      - -X spectre/internal/version.Commit={{.ShortCommit}}

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - SPECTRE-PLAN.md
      - packaging/linux/spectre.service
      - packaging/macos/com.spectre.daemon.plist

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

signs:
  - artifacts: checksum
    args: ["--detach-sign", "--armor", "${artifact}"]

release:
  github:
    owner: EgieSugina
    name: S.P.E.C.T.R.E
