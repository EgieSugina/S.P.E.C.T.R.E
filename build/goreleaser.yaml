version: 2

project_name: spectre

before:
  hooks:
    - bash -c "cd web && pnpm install --frozen-lockfile && pnpm build"
    - bash -c "cp -r web/dist internal/server/dist"

builds:
  - id: spectre
    main: ./cmd/spectre
    binary: spectre
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X spectre/internal/version.Version={{.Version}}
      - -X spectre/internal/version.BuildDate={{.Date}}
      - -X spectre/internal/version.Commit={{.ShortCommit}}
    # CGO + SQLite requires a C cross-compiler; Zig provides portable targets.
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=zig cc -target x86_64-linux-gnu
          - CXX=zig c++ -target x86_64-linux-gnu
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=zig cc -target aarch64-linux-gnu
          - CXX=zig c++ -target aarch64-linux-gnu
      - goos: windows
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=zig cc -target x86_64-windows-gnu
          - CXX=zig c++ -target x86_64-windows-gnu

archives:
  - id: default
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    files:
      - README.md
      - SPECTRE-PLAN.md
      - packaging/linux/spectre.service

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: EgieSugina
    name: S.P.E.C.T.R.E
